name: Documentation Sync Check

on:
  pull_request:
    branches:
      - main

jobs:
  docs-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changes in domain layer
        run: |
          if git diff --name-only origin/main...HEAD | grep '^src/domain/'; then
            if ! git diff --name-only origin/main...HEAD | grep '^docs/architecture/domain.mdx'; then
              echo "Domain code changed but documentation was not updated."
              exit 1
            fi
          fi

      - name: Detect changes in application layer
        run: |
          if git diff --name-only origin/main...HEAD | grep '^src/application/'; then
            if ! git diff --name-only origin/main...HEAD | grep '^docs/architecture/application.mdx'; then
              echo "Application layer changed but documentation was not updated."
              exit 1
            fi
          fi